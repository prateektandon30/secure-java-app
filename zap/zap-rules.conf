# zap/zap-rules.conf
# Tune OWASP ZAP scan rules.
# Format: rule-id  IGNORE/WARN/FAIL  optional-param

# Ignore informational alerts that aren't exploitable
10015	IGNORE	# Incomplete or No Cache-control Header
10027	IGNORE	# Information Disclosure - Suspicious Comments (test env)
10049	IGNORE	# Storable and Cacheable Content

# Warn (don't fail) on these medium findings
10020	WARN	# X-Frame-Options (we set DENY via Spring Security, ZAP may still warn)
10021	WARN	# X-Content-Type-Options

# Fail on any HIGH or CRITICAL
40012	FAIL	# Cross-Site Scripting (Reflected)
40014	FAIL	# Cross-Site Scripting (Persistent)
40018	FAIL	# SQL Injection
40019	FAIL	# SQL Injection - MySQL
40026	FAIL	# Cross-Site Scripting (DOM)
90020	FAIL	# Remote OS Command Injection
90035	FAIL	# Server Side Template Injection
