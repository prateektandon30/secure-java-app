# ── Server ────────────────────────────────────────────────────
server.port=8080

# ── Database (H2 in-memory for demo) ──────────────────────────
spring.datasource.url=jdbc:h2:mem:securedb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JWT ───────────────────────────────────────────────────────
# Override this via environment variable in production:
# APP_JWT_SECRET=<your-64-char-secret>
app.jwt.secret=${APP_JWT_SECRET:super-secret-key-replace-in-production-min32}
app.jwt.expiration-ms=86400000

# ── Actuator ──────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ── Logging ───────────────────────────────────────────────────
logging.level.com.secureapp=DEBUG
logging.level.org.springframework.security=INFO
